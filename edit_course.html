<!DOCTYPE html>
<html>
<head>
    <title>Edit Course</title>
</head>
<body>

<h2>Edit Course</h2>

<form method="POST">
    <input name="name" value="{{data[1]}}" placeholder="Course Name"><br><br>
    <input name="eligibility" value="{{data[2]}}" placeholder="Eligibility"><br><br>
    <input name="fees" value="{{data[3]}}" placeholder="Fees"><br><br>
    <input name="duration" value="{{data[4]}}" placeholder="Duration"><br><br>
    <button>Update</button>
</form>

</body>
</html>
